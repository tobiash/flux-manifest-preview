name: 'Flux Manifest Preview'
description: 'Render and diff Flux GitOps manifests'
inputs:
  repo:
    description: Path to the repository checkout (must be a git worktree with full history)
    required: false
    default: '.'
  base-ref:
    description: Git ref to diff against (e.g. origin/main, HEAD~1). Defaults to origin/main or main.
    required: false
    default: ''
  helm:
    description: Enable Helm rendering
    required: false
    default: 'true'
  resolve-git:
    description: Clone and follow external GitRepository sources
    required: false
    default: 'false'
  filter:
    description: KIO filters to apply to rendered YAML (overrides .fmp.yaml filters)
    required: false
    default: ''
  config:
    description: Path to an explicit .fmp.yaml config file (overrides auto-discovery)
    required: false
    default: ''
  sort:
    description: Sort output for deterministic diffs
    required: false
    default: 'false'
  exclude-crds:
    description: Strip CustomResourceDefinitions from output
    required: false
    default: 'false'
  post-comment:
    description: 'Post/update a comment on the Pull Request with the diff summary'
    required: false
    default: 'false'
  github-token:
    description: 'GitHub token for posting comments'
    required: false
    default: ${{ github.token }}
  # Legacy inputs for backward compatibility with the two-checkout workflow
  repo-a:
    description: '(Legacy) Path to the base repository checkout'
    required: false
    default: ''
  repo-b:
    description: '(Legacy) Path to the target repository checkout'
    required: false
    default: ''
  kustomizations:
    description: '(Legacy) Kustomize bases to render (newline-separated, relative to repo path)'
    required: false
    default: ''
outputs:
  diff:
    description: Diff in unified format
    value: ${{ steps.fmp.outputs.diff }}
runs:
  using: 'composite'
  steps:
    - name: Install fmp
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p "$RUNNER_TOOL_CACHE/fmp"

        REF="${{ github.action_ref }}"
        BUILD_FROM_SOURCE=false

        if [[ "$REF" == v* ]]; then
          echo "::group::Download fmp $REF"
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64) ARCH="amd64" ;;
            aarch64) ARCH="arm64" ;;
            *) echo "Unsupported architecture: $ARCH" && exit 1 ;;
          esac
          URL="https://github.com/tobiash/flux-manifest-preview/releases/download/${REF}/fmp_${REF}_linux_${ARCH}.tar.gz"
          
          if curl -fsSL --fail "$URL" -o fmp.tar.gz; then
            tar -xzf fmp.tar.gz -C "$RUNNER_TOOL_CACHE/fmp" fmp
            chmod +x "$RUNNER_TOOL_CACHE/fmp/fmp"
            rm fmp.tar.gz
            echo "Successfully downloaded fmp from $URL"
            echo "::endgroup::"
          else
            echo "Failed to download fmp from $URL, falling back to build from source"
            echo "::endgroup::"
            BUILD_FROM_SOURCE=true
          fi
        else
          BUILD_FROM_SOURCE=true
        fi

        if [[ "$BUILD_FROM_SOURCE" == "true" ]]; then
          echo "::group::Build fmp from source ($REF)"
          cd "${{ github.action_path }}"
          go build -ldflags="-s -w" -trimpath -o "$RUNNER_TOOL_CACHE/fmp/fmp" ./cmd/fmp
          chmod +x "$RUNNER_TOOL_CACHE/fmp/fmp"
          echo "::endgroup::"
        fi

        echo "$RUNNER_TOOL_CACHE/fmp" >> "$GITHUB_PATH"

    - name: Flux Manifest Preview
      id: fmp
      shell: bash
      run: |
        set -euo pipefail

        if [[ -n "${{ inputs.repo-a }}" && -n "${{ inputs.repo-b }}" ]]; then
          echo "::warning::repo-a/repo-b inputs are deprecated; use repo and base-ref instead"
          export FMP_REPO_A="${{ inputs.repo-a }}"
          export FMP_REPO_B="${{ inputs.repo-b }}"
          if [[ -n "${{ inputs.kustomizations }}" ]]; then
            export FMP_KUSTOMIZATIONS="${{ inputs.kustomizations }}"
          fi
          if [[ -n "${{ inputs.helm }}" ]]; then
            export FMP_RENDER_HELM="${{ inputs.helm }}"
          fi
          DIFF=$(fmp ci)
          echo "$DIFF"
          {
            echo "diff<<EOF"
            echo "$DIFF"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          exit 0
        fi

        REPO="${{ inputs.repo }}"
        BASE_REF="${{ inputs.base-ref }}"

        cd "$REPO"

        if [[ -z "$BASE_REF" ]]; then
          if git rev-parse --verify --quiet "origin/main" >/dev/null 2>&1; then
            BASE_REF="origin/main"
          elif git rev-parse --verify --quiet "main" >/dev/null 2>&1; then
            BASE_REF="main"
          else
            echo "::error::No base-ref specified and could not find main branch"
            exit 1
          fi
        fi

        FMP_ARGS=("diff" "$BASE_REF")

        if [[ "${{ inputs.helm }}" == "true" ]]; then
          FMP_ARGS+=("--render-helm")
        fi
        if [[ "${{ inputs.resolve-git }}" == "true" ]]; then
          FMP_ARGS+=("--resolve-git")
        fi
        if [[ -n "${{ inputs.config }}" ]]; then
          FMP_ARGS+=("--filter" "${{ inputs.config }}")
        fi
        if [[ "${{ inputs.sort }}" == "true" ]]; then
          FMP_ARGS+=("--sort")
        fi
        if [[ "${{ inputs.exclude-crds }}" == "true" ]]; then
          FMP_ARGS+=("--exclude-crds")
        fi

        echo "::group::fmp diff ${FMP_ARGS[*]}"
        DIFF=$(fmp "${FMP_ARGS[@]}" 2>&1) || true
        echo "::endgroup::"

        echo "$DIFF"
        {
          echo "diff<<EOF"
          echo "$DIFF"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

        if echo "$DIFF" | rg -q '^ERROR:'; then
          exit 1
        fi

    - name: Process Diff
      id: process-diff
      shell: bash
      env:
        DIFF: ${{ steps.fmp.outputs.diff }}
      run: |
        # Calculate summary
        PLUS_LINES=$(echo "$DIFF" | grep -c '^+[^+]' || true)
        MINUS_LINES=$(echo "$DIFF" | grep -c '^-[^-]' || true)

        SUMMARY="### 📊 Flux Manifest Preview Summary"
        SUMMARY="$SUMMARY"$'\n'"- **Lines Added:** $PLUS_LINES"
        SUMMARY="$SUMMARY"$'\n'"- **Lines Removed:** $MINUS_LINES"

        MAX_LEN=60000
        TRUNCATED=false
        if [ ${#DIFF} -gt $MAX_LEN ]; then
          DIFF_DISPLAY="${DIFF:0:$MAX_LEN}"
          DIFF_DISPLAY="$DIFF_DISPLAY"$'\n'"... (diff truncated, too large for GitHub comment)"
          TRUNCATED=true
        else
          DIFF_DISPLAY="$DIFF"
        fi

        if [ -n "$DIFF" ]; then
          MARKDOWN="$SUMMARY"
          MARKDOWN="$MARKDOWN"$'\n\n'"<details>"
          MARKDOWN="$MARKDOWN"$'\n'"<summary>View Diff</summary>"
          MARKDOWN="$MARKDOWN"$'\n\n'"\`\`\`diff"
          MARKDOWN="$MARKDOWN"$'\n'"$DIFF_DISPLAY"
          MARKDOWN="$MARKDOWN"$'\n'"\`\`\`"
          MARKDOWN="$MARKDOWN"$'\n\n'"</details>"
        else
          MARKDOWN="$SUMMARY"
          MARKDOWN="$MARKDOWN"$'\n\n'"*No manifest changes detected.*"
        fi

        # Use a marker to identify the comment
        MARKDOWN="$MARKDOWN"$'\n\n'"<!-- fmp-comment-marker -->"

        # Set outputs
        {
          echo "markdown<<EOF"
          echo "$MARKDOWN"
          echo "EOF"
          echo "truncated=$TRUNCATED"
        } >> "$GITHUB_OUTPUT"

    - name: Step Summary
      shell: bash
      run: |
        echo "${{ steps.process-diff.outputs.markdown }}" >> "$GITHUB_STEP_SUMMARY"

    - name: Post PR Comment
      if: ${{ inputs.post-comment == 'true' && github.event_name == 'pull_request' }}
      uses: actions/github-script@v6
      env:
        MARKDOWN: ${{ steps.process-diff.outputs.markdown }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const body = process.env.MARKDOWN;
          const issue_number = context.issue.number;
          const { owner, repo } = context.repo;

          const comments = await github.rest.issues.listComments({
            owner,
            repo,
            issue_number,
          });

          const botComment = comments.data.find(comment => comment.body.includes('<!-- fmp-comment-marker -->'));

          if (botComment) {
            await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: botComment.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            });
          }

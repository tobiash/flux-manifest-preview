name: 'Flux Manifest Preview'
description: 'Render and diff Flux GitOps manifests'
inputs:
  repo:
    description: Path to the repository checkout (must be a git worktree with full history)
    required: false
    default: '.'
  base-ref:
    description: Git ref to diff against (e.g. origin/main, HEAD~1). Defaults to origin/main or main.
    required: false
    default: ''
  helm:
    description: Enable Helm rendering
    required: false
    default: 'true'
  resolve-git:
    description: Clone and follow external GitRepository sources
    required: false
    default: 'false'
  filter:
    description: KIO filters to apply to rendered YAML (overrides .fmp.yaml filters)
    required: false
    default: ''
  config:
    description: Path to an explicit .fmp.yaml config file (overrides auto-discovery)
    required: false
    default: ''
  sort:
    description: Sort output for deterministic diffs
    required: false
    default: 'false'
  exclude-crds:
    description: Strip CustomResourceDefinitions from output
    required: false
    default: 'false'
  # Legacy inputs for backward compatibility with the two-checkout workflow
  repo-a:
    description: '(Legacy) Path to the base repository checkout'
    required: false
    default: ''
  repo-b:
    description: '(Legacy) Path to the target repository checkout'
    required: false
    default: ''
  kustomizations:
    description: '(Legacy) Kustomize bases to render (newline-separated, relative to repo path)'
    required: false
    default: ''
outputs:
  diff:
    description: Diff in unified format
    value: ${{ steps.fmp.outputs.diff }}
runs:
  using: 'composite'
  steps:
    - name: Install fmp
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p "$RUNNER_TOOL_CACHE/fmp"

        REF="${{ github.action_ref }}"

        if [[ "$REF" == v* ]]; then
          echo "::group::Download fmp $REF"
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64) ARCH="amd64" ;;
            aarch64) ARCH="arm64" ;;
            *) echo "Unsupported architecture: $ARCH" && exit 1 ;;
          esac
          URL="https://github.com/tobiash/flux-manifest-preview/releases/download/${REF}/fmp_${REF}_linux_${ARCH}.tar.gz"
          curl -fsSL "$URL" | tar -xz -C "$RUNNER_TOOL_CACHE/fmp" fmp
          chmod +x "$RUNNER_TOOL_CACHE/fmp/fmp"
          echo "::endgroup::"
        else
          echo "::group::Build fmp from source ($REF)"
          cd "${{ github.action_path }}"
          go build -ldflags="-s -w" -trimpath -o "$RUNNER_TOOL_CACHE/fmp/fmp" ./cmd/fmp
          chmod +x "$RUNNER_TOOL_CACHE/fmp/fmp"
          echo "::endgroup::"
        fi

        echo "$RUNNER_TOOL_CACHE/fmp" >> "$GITHUB_PATH"

    - name: Flux Manifest Preview
      id: fmp
      shell: bash
      run: |
        set -euo pipefail

        if [[ -n "${{ inputs.repo-a }}" && -n "${{ inputs.repo-b }}" ]]; then
          echo "::warning::repo-a/repo-b inputs are deprecated; use repo and base-ref instead"
          export FMP_REPO_A="${{ inputs.repo-a }}"
          export FMP_REPO_B="${{ inputs.repo-b }}"
          DIFF=$(fmp ci)
          echo "$DIFF"
          {
            echo "diff<<EOF"
            echo "$DIFF"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          exit 0
        fi

        REPO="${{ inputs.repo }}"
        BASE_REF="${{ inputs.base-ref }}"

        cd "$REPO"

        if [[ -z "$BASE_REF" ]]; then
          if git rev-parse --verify --quiet "origin/main" >/dev/null 2>&1; then
            BASE_REF="origin/main"
          elif git rev-parse --verify --quiet "main" >/dev/null 2>&1; then
            BASE_REF="main"
          else
            echo "::error::No base-ref specified and could not find main branch"
            exit 1
          fi
        fi

        FMP_ARGS=("diff" "$BASE_REF")

        if [[ "${{ inputs.helm }}" == "true" ]]; then
          FMP_ARGS+=("--render-helm")
        fi
        if [[ "${{ inputs.resolve-git }}" == "true" ]]; then
          FMP_ARGS+=("--resolve-git")
        fi
        if [[ -n "${{ inputs.config }}" ]]; then
          FMP_ARGS+=("--filter" "${{ inputs.config }}")
        fi
        if [[ "${{ inputs.sort }}" == "true" ]]; then
          FMP_ARGS+=("--sort")
        fi
        if [[ "${{ inputs.exclude-crds }}" == "true" ]]; then
          FMP_ARGS+=("--exclude-crds")
        fi

        echo "::group::fmp diff ${FMP_ARGS[*]}"
        DIFF=$(fmp "${FMP_ARGS[@]}" 2>&1) || true
        echo "::endgroup::"

        echo "$DIFF"
        {
          echo "diff<<EOF"
          echo "$DIFF"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

        if echo "$DIFF" | rg -q '^ERROR:'; then
          exit 1
        fi

name: 'Flux Manifest Preview'
description: 'Render and diff Flux GitOps manifests with structured outputs and optional PR comments'

inputs:
  binary:
    description: 'Path to an existing fmp executable for local or non-release testing'
    required: false
    default: ''
  repo:
    description: 'Path to the repository checkout (must be a git worktree with full history)'
    required: false
    default: '.'
  base-ref:
    description: 'Git ref to diff against (e.g. origin/main, HEAD~1). Defaults to origin/main or main.'
    required: false
    default: ''
  base-sha:
    description: 'Exact SHA to diff against. Overrides base-ref when set.'
    required: false
    default: ''
  paths:
    description: 'Kustomize bases or directories to render (newline-separated, relative to repo root)'
    required: false
    default: ''
  recursive:
    description: 'Recursively discover all paths under each directory'
    required: false
    default: 'false'
  helm:
    description: 'Enable Helm rendering'
    required: false
    default: 'true'
  resolve-git:
    description: 'Clone and follow external GitRepository sources'
    required: false
    default: 'false'
  sort:
    description: 'Sort output for deterministic diffs'
    required: false
    default: 'false'
  exclude-crds:
    description: 'Strip CustomResourceDefinitions from output'
    required: false
    default: 'false'
  helm-release:
    description: 'Filter diff to a specific HelmRelease by name'
    required: false
    default: ''
  config:
    description: 'Path to an explicit .fmp.yaml config file (overrides auto-discovery)'
    required: false
    default: ''
  filter-file:
    description: 'Path to a KIO filters definition file'
    required: false
    default: ''
  filter-yaml:
    description: 'Raw KIO filters YAML string'
    required: false
    default: ''
  registry-config:
    description: 'Helm registry config path'
    required: false
    default: ''
  repository-config:
    description: 'Helm repository config path'
    required: false
    default: ''
  repository-cache:
    description: 'Helm repository cache path'
    required: false
    default: ''
  export-dir:
    description: 'Export rendered manifests to this directory'
    required: false
    default: ''
  export-changed-only:
    description: 'Only export manifests that have changed'
    required: false
    default: 'false'
  write-summary:
    description: 'Write a step summary'
    required: false
    default: 'true'
  comment:
    description: 'Post/update a sticky PR comment'
    required: false
    default: 'false'
  comment-mode:
    description: 'When to comment: changes, always, failure'
    required: false
    default: 'changes'
  github-token:
    description: 'Token for PR comments'
    required: false
    default: ${{ github.token }}
  max-inline-diff-bytes:
    description: 'Max diff bytes to inline in comments/summaries'
    required: false
    default: '50000'
  diff-preview-lines:
    description: 'Max diff lines to show in previews'
    required: false
    default: '200'
  fail-on-warning:
    description: 'Fail the step on warnings'
    required: false
    default: 'false'
  fail-on-error:
    description: 'Fail the step on errors'
    required: false
    default: 'true'
  repo-a:
    description: 'Path to the base repository checkout'
    required: false
    default: ''
  repo-b:
    description: 'Path to the target repository checkout'
    required: false
    default: ''
  kustomizations:
    description: 'Kustomize bases to render (newline-separated, relative to repo path)'
    required: false
    default: ''

outputs:
  status:
    description: 'Overall status: clean, changed, warning, error'
  changed:
    description: 'Whether manifest changes were detected'
  warnings-count:
    description: 'Number of warnings'
  errors-count:
    description: 'Number of errors'
  resources-added:
    description: 'Number of added resources'
  resources-modified:
    description: 'Number of modified resources'
  resources-deleted:
    description: 'Number of deleted resources'
  resources-total:
    description: 'Total number of changed resources'
  diff-bytes:
    description: 'Size of the full diff in bytes'
  diff-truncated:
    description: 'Whether the inline diff was truncated'
  diff-file:
    description: 'Path to the full diff file'
  summary-file:
    description: 'Path to the summary markdown file'
  comment-file:
    description: 'Path to the comment markdown file'
  report-file:
    description: 'Path to the structured JSON report'
  export-dir:
    description: 'Directory where rendered manifests were exported'

runs:
  using: 'node24'
  main: 'dist/index.js'

name: 'Flux Manifest Preview'
description: 'Render and diff Flux GitOps manifests'
inputs:
  repo-a:
    description: Path to the base repository checkout
    required: true
  repo-b:
    description: Path to the target repository checkout
    required: true
  helm:
    description: Enable Helm rendering
    required: false
    default: 'true'
  kustomizations:
    description: Kustomize bases to render (newline-separated, relative to repo path)
    required: false
    default: ''
  filter:
    description: KIO filters to apply to rendered YAML
    required: false
    default: ''
outputs:
  diff:
    description: Diff in unified format
    value: ${{ steps.fmp.outputs.diff }}
runs:
  using: 'composite'

  steps:
    - name: Download fmp
      shell: bash
      run: |
        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64) ARCH="x86_64" ;;
          aarch64) ARCH="arm64" ;;
          *) echo "Unsupported architecture: $ARCH" && exit 1 ;;
        esac
        VERSION="${{ github.action_ref }}"
        URL="https://github.com/tobiash/flux-manifest-preview/releases/download/${VERSION}/fmp_${VERSION}_linux_${ARCH}.tar.gz"
        mkdir -p "$RUNNER_TOOL_CACHE/fmp"
        if [ ! -f "$RUNNER_TOOL_CACHE/fmp/fmp" ]; then
          curl -fsSL "$URL" | tar -xz -C "$RUNNER_TOOL_CACHE/fmp" fmp
          chmod +x "$RUNNER_TOOL_CACHE/fmp/fmp"
        fi
        echo "$RUNNER_TOOL_CACHE/fmp" >> "$GITHUB_PATH"

    - name: Flux Manifest Preview
      id: fmp
      shell: bash
      run: fmp ci
      env:
        FMP_REPO_A: ${{ inputs.repo-a }}
        FMP_REPO_B: ${{ inputs.repo-b }}
        FMP_RENDER_HELM: ${{ inputs.helm }}
        FMP_KUSTOMIZATIONS: ${{ inputs.kustomizations }}
        FMP_FILTER: ${{ inputs.filter }}

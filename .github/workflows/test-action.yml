name: Action Integration Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'action.yml'
      - '.github/workflows/test-action.yml'
      - 'src/**'
      - 'dist/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tests/action/**'

concurrency:
  group: action-integration-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-custom-binary:
    name: Test action (custom binary)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # Simulate a PR diff by comparing the repo against itself.
      # The "base" is the test fixture, the "target" is the same
      # fixture with a modified value — produces a real diff.
      - name: Prepare test repos
        run: |
          cp -r tests/action /tmp/repo-a
          cp -r tests/action /tmp/repo-b
          # Modify a value in repo-b so the diff is non-empty
          sed -i 's/color: blue/color: green/' /tmp/repo-b/apps/podinfo/configmap.yaml

      - name: Build fmp
        run: go build -trimpath -ldflags="-s -w" -o /tmp/fmp ./cmd/fmp

      - name: Run flux-manifest-preview
        id: fmp
        uses: ./
        with:
          binary: /tmp/fmp
          repo-a: /tmp/repo-a
          repo-b: /tmp/repo-b
          kustomizations: |
            clusters/kube
          helm: 'false'
          html-report: 'true'

      - name: Verify outputs
        run: |
          echo "Status: ${{ steps.fmp.outputs.status }}"
          echo "Changed: ${{ steps.fmp.outputs.changed }}"
          echo "Resources total: ${{ steps.fmp.outputs.resources-total }}"
          
          if [ "${{ steps.fmp.outputs.changed }}" != "true" ]; then
            echo "ERROR: expected changed=true"
            exit 1
          fi
          
          if [ -z "${{ steps.fmp.outputs.diff-file }}" ]; then
            echo "ERROR: diff-file output is empty"
            exit 1
          fi
          
          if [ ! -f "${{ steps.fmp.outputs.diff-file }}" ]; then
            echo "ERROR: diff file does not exist"
            exit 1
          fi
          
          echo "Diff file: ${{ steps.fmp.outputs.diff-file }}"
          cat "${{ steps.fmp.outputs.diff-file }}" | grep -q "blue" || { echo "Missing 'blue' in diff"; exit 1; }
          cat "${{ steps.fmp.outputs.diff-file }}" | grep -q "green" || { echo "Missing 'green' in diff"; exit 1; }
          echo "Diff contains expected changes"
          
          if [ -z "${{ steps.fmp.outputs.summary-file }}" ]; then
            echo "ERROR: summary-file output is empty"
            exit 1
          fi
          echo "Summary file exists: ${{ steps.fmp.outputs.summary-file }}"
          
          if [ -z "${{ steps.fmp.outputs.report-file }}" ]; then
            echo "ERROR: report-file output is empty"
            exit 1
          fi
          echo "Report file exists: ${{ steps.fmp.outputs.report-file }}"

          if [ -z "${{ steps.fmp.outputs.html-report-file }}" ]; then
            echo "ERROR: html-report-file output is empty"
            exit 1
          fi
          if [ ! -f "${{ steps.fmp.outputs.html-report-file }}" ]; then
            echo "ERROR: html report file does not exist"
            exit 1
          fi
          grep -q "fmp-report-data" "${{ steps.fmp.outputs.html-report-file }}" || { echo "Missing embedded report data"; exit 1; }

  test-cli:
    name: Test fmp CLI commands
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build fmp
        run: go build -o /usr/local/bin/fmp ./cmd/fmp
      - name: Run fmp test (should pass)
        run: fmp test tests/action -k clusters/kube --render-helm=false -q
      - name: Run fmp test (should fail on broken path)
        run: |
          if fmp test tests/action -k nonexistent --render-helm=false -q 2>/dev/null; then
            echo "ERROR: fmp test should have failed for nonexistent path"
            exit 1
          fi
          echo "Correctly failed for nonexistent path"
      - name: Render and verify sorted output
        run: |
          OUTPUT=$(fmp render tests/action -k apps/podinfo --render-helm=false -q -s)
          echo "$OUTPUT" | head -1 | grep -q "^apiVersion" || { echo "Missing apiVersion"; exit 1; }
          echo "$OUTPUT" | grep -q "kind: ConfigMap" || { echo "Missing ConfigMap kind"; exit 1; }
          echo "$OUTPUT" | grep -q "name: podinfo-config" || { echo "Missing resource name"; exit 1; }

          # Verify deterministic order: run twice, expect identical output
          OUTPUT2=$(fmp render tests/action -k apps/podinfo --render-helm=false -q -s)
          if [ "$OUTPUT" != "$OUTPUT2" ]; then
            echo "ERROR: sorted output is not deterministic"
            exit 1
          fi
          echo "Sorted output is deterministic"

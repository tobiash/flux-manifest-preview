name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GOLANGCI_LINT_VERSION: v2.1.6

jobs:
  checks:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Verify formatting
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "Unformatted files:"
            gofmt -s -l .
            exit 1
          fi
      - name: Verify go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - run: go vet ./...

  security:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cache golangci-lint
        uses: actions/cache@v4
        with:
          path: ~/go/bin/golangci-lint
          key: golangci-lint-${{ env.GOLANGCI_LINT_VERSION }}-${{ runner.os }}

      - name: Install golangci-lint
        run: |
          if [ ! -f ~/go/bin/golangci-lint ]; then
            go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${{ env.GOLANGCI_LINT_VERSION }}
          fi

      - name: Run golangci-lint
        run: golangci-lint run --timeout=5m ./...

      - name: Cache govulncheck DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/govulncheck
          key: govulncheck-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: govulncheck-db-${{ runner.os }}-

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  test-build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Test
        run: go test -race -coverprofile=coverage.out ./...
      # Uncomment after authorizing codecov.io for the repo:
      # - uses: codecov/codecov-action@v5
      #   with:
      #     files: coverage.out
      - name: Cross-compile
        run: |
          GOOS=linux  GOARCH=amd64 go build -o /dev/null ./cmd/fmp &
          GOOS=linux  GOARCH=arm64 go build -o /dev/null ./cmd/fmp &
          GOOS=darwin GOARCH=amd64 go build -o /dev/null ./cmd/fmp &
          GOOS=darwin GOARCH=arm64 go build -o /dev/null ./cmd/fmp &
          wait
